kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  # Port mappings for Ingress and Kafka
    extraPortMappings:
      - containerPort: 80
        hostPort: 8085
        protocol: TCP
      - containerPort: 9092
        hostPort: 9092
        protocol: TCP
  - role: worker
  - role: worker